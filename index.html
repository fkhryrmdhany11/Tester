function createRoundParticleTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createRadialGradient(32, 32, 2, 32, 32, 32);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.55, "rgba(255,255,255,0.95)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 64, 64);
  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 96, 96);
  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function buildRingPoints(count, minRadius, maxRadius, opacity) {
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i += 1) {
    const ang = rand(0, Math.PI * 2);
    const radius = rand(minRadius, maxRadius);
    pos[i * 3] = Math.cos(ang) * radius;
    pos[i * 3 + 1] = rand(-2.2, 2.2);
    pos[i * 3 + 2] = Math.sin(ang) * radius;
    col[i * 3] = 1;
    col[i * 3 + 1] = 1;
    col[i * 3 + 2] = 1;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
  return new THREE.Points(
    geo,
    new THREE.PointsMaterial({
      size: 2.55,
      sizeAttenuation: true,
      map: roundParticleMap,
      alphaTest: 0.08,
      vertexColors: true,
      transparent: false,
      opacity,
      depthWrite: false
    })
  );
}

function drawTitleOnCanvas(ctx, canvas, text) {
  const safeText = (text || "").trim() || DEFAULT_TITLE_TEXT;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = "700 150px 'Trebuchet MS', sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#f2e4ba";
  ctx.shadowColor = "rgba(242,228,186,0.4)";
  ctx.shadowBlur = 22;
  ctx.fillText(safeText, canvas.width / 2, canvas.height / 2);
}

function createTitleMesh(text) {
  const canvas = document.createElement("canvas");
  canvas.width = 2048;
  canvas.height = 512;
  const ctx = canvas.getContext("2d");
  drawTitleOnCanvas(ctx, canvas, text);
  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  const material = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(430, 108), material);
  mesh.userData.titleCanvas = canvas;
  mesh.userData.titleCtx = ctx;
  return mesh;
}

function buildRedParticleSphere(count, radius) {
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  const dir = new Float32Array(count * 3);
  const phase = new Float32Array(count);
  const amp = new Float32Array(count);
  const shake = new Float32Array(count);
  const floatAmp = new Float32Array(count);
  const innerRadius = radius * 0.64;
  const shellThickness = radius - innerRadius;
  for (let i = 0; i < count; i += 1) {
    const theta = rand(0, Math.PI * 2);
    const phi = Math.acos(rand(-1, 1));
    // Bias to outer skin for thicker outer shell.
    const r = radius - (Math.pow(Math.random(), 4.2) * shellThickness);
    const x = r * Math.sin(phi) * Math.cos(theta);
    const y = r * Math.cos(phi);
    const z = r * Math.sin(phi) * Math.sin(theta);
    pos[i * 3] = x;
    pos[i * 3 + 1] = y;
    pos[i * 3 + 2] = z;
    const invLen = 1 / Math.max(Math.hypot(x, y, z), 0.0001);
    dir[i * 3] = x * invLen;
    dir[i * 3 + 1] = y * invLen;
    dir[i * 3 + 2] = z * invLen;
    phase[i] = rand(0, Math.PI * 2);
    amp[i] = rand(0.8, 2.6);
    shake[i] = rand(0.12, 0.45);
    floatAmp[i] = rand(0.25, 0.8);
    col[i * 3] = 1;
    col[i * 3 + 1] = rand(0.01, 0.07);
    col[i * 3 + 2] = rand(0.01, 0.06);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
  const points = new THREE.Points(
    geo,
    new THREE.PointsMaterial({
      size: 4.5,
      sizeAttenuation: true,
      vertexColors: true,
      map: softRedParticleMap,
      alphaTest: 0.01,
      transparent: true,
      opacity: 1,
      depthWrite: false
    })
  );
  points.userData.basePos = new Float32Array(pos);
  points.userData.dir = dir;
  points.userData.phase = phase;
  points.userData.amp = amp;
  points.userData.shake = shake;
  points.userData.floatAmp = floatAmp;
  return points;
}

}

function makePhotoTexture(seed) {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");
  const hue = (seed * 43) % 360;
  const grad = ctx.createLinearGradient(0, 0, 128, 128);
  grad.addColorStop(0, `hsl(${hue}deg 85% 72%)`);
  grad.addColorStop(1, `hsl(${(hue + 110) % 360}deg 70% 52%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 128);
  ctx.fillStyle = "rgba(255,255,255,0.82)";
  ctx.beginPath();
  ctx.arc(64, 50, 24, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "rgba(245,245,245,0.78)";
  ctx.fillRect(32, 78, 64, 36);
  ctx.strokeStyle = "rgba(255,255,255,0.95)";
  ctx.lineWidth = 6;
  ctx.strokeRect(3, 3, 122, 122);
  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = 4;
  return tex;
}

function createRoundedCornerMaskTexture(size = 256, radius = 38) {
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.moveTo(radius, 0);
  ctx.lineTo(size - radius, 0);
  ctx.quadraticCurveTo(size, 0, size, radius);
  ctx.lineTo(size, size - radius);
  ctx.quadraticCurveTo(size, size, size - radius, size);
  ctx.lineTo(radius, size);
  ctx.quadraticCurveTo(0, size, 0, size - radius);
  ctx.lineTo(0, radius);
  ctx.quadraticCurveTo(0, 0, radius, 0);
  ctx.closePath();
  ctx.fill();
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  return tex;
}

function openPhotoDb() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(PHOTO_DB_NAME, 1);
    request.onupgradeneeded = () => {
      const db = request.result;
      if (!db.objectStoreNames.contains(PHOTO_DB_STORE)) {
        db.createObjectStore(PHOTO_DB_STORE);
      }
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

function readSavedPhotoBlobs() {
  return openPhotoDb().then((db) => new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_DB_STORE, "readonly");
    const store = tx.objectStore(PHOTO_DB_STORE);
    const request = store.get(PHOTO_DB_KEY);
    request.onsuccess = () => {
      const value = request.result;
      resolve(Array.isArray(value) ? value : []);
    };
    request.onerror = () => reject(request.error);
    tx.oncomplete = () => db.close();
  }));
}

function savePhotoBlobs(blobs) {
  return openPhotoDb().then((db) => new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_DB_STORE, "readwrite");
    const store = tx.objectStore(PHOTO_DB_STORE);
    store.put(blobs, PHOTO_DB_KEY);
    tx.oncomplete = () => {
      db.close();
      resolve();
    };
    tx.onerror = () => reject(tx.error);
  }));
}

function clearSavedPhotoBlobs() {
  return openPhotoDb().then((db) => new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_DB_STORE, "readwrite");
    const store = tx.objectStore(PHOTO_DB_STORE);
    store.delete(PHOTO_DB_KEY);
    tx.oncomplete = () => {
      db.close();
      resolve();
    };
    tx.onerror = () => reject(tx.error);
  }));
}

function updateUploadPanelText() {
  uploadStatus.textContent = userPhotoBlobs.length > 0
    ? `Foto custom: ${userPhotoBlobs.length}`
    : "Foto custom: 0";
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}

const ringCount = 5;
const ringMinRadius = 280;
const ringStep = 95;
const ringYLevels = [14, 20, 26, 32, 38];
const slotsPerRing = Math.floor(cardCount / ringCount);
const extraSlots = cardCount % ringCount;
const photoSlotOrder = shuffleArray(Array.from({ length: cardCount }, (_, idx) => idx));

function getTextureFromActivePhotos(photoIndex) {
  const activeUrls = userPhotoUrls.length > 0 ? userPhotoUrls : photoUrls;
  const hasManualPhotos = activeUrls.length > 0;
  return hasManualPhotos
    ? textureLoader.load(activeUrls[photoIndex % activeUrls.length])
    : makePhotoTexture(photoIndex + 1);
}

for (let i = 0; i < cardCount; i += 1) {
  const ringIndex = Math.min(Math.floor(i / slotsPerRing), ringCount - 1);
  const firstIndexInRing = ringIndex * slotsPerRing;
  const ringSlots = ringIndex === ringCount - 1 ? slotsPerRing + extraSlots : slotsPerRing;
  const slotInRing = i - firstIndexInRing;
  const ringBaseAngle = (ringIndex * 0.47) + rand(-0.08, 0.08);
  const angleStep = (Math.PI * 2) / ringSlots;
  const ang = ringBaseAngle + (slotInRing * angleStep) + rand(-0.07, 0.07);
  const radius = ringMinRadius + (ringIndex * ringStep) + rand(-12, 12);

  const w = 36;
  const h = w * (16 / 9);
  const photoIndex = photoSlotOrder[i];
  const tex = getTextureFromActivePhotos(photoIndex);
  const mat = new THREE.MeshStandardMaterial({
    map: tex,
    alphaMap: roundedCardMask,
    transparent: true,
    alphaTest: 0.35,
    emissive: 0x202020,
    roughness: 0.42,
    metalness: 0.04
  });
  const plane = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  plane.position.set(
    Math.cos(ang) * radius,
    ringYLevels[ringIndex] + rand(-1.6, 1.6),
    Math.sin(ang) * radius
  );
  plane.rotation.y = rand(-0.14, 0.14);
  plane.rotation.x = rand(-0.04, 0.04);
  plane.userData.angle = ang;
  plane.userData.radius = radius;
  plane.userData.speed = rand(0.00035, 0.0009);
  plane.userData.baseY = plane.position.y;
  plane.userData.floatOffset = rand(0, Math.PI * 2);
  plane.userData.photoIndex = photoIndex;
  cardGroup.add(plane);
}

function revokeUserPhotoUrls() {
  for (let i = 0; i < userPhotoUrls.length; i += 1) {
    URL.revokeObjectURL(userPhotoUrls[i]);
  }
}

function syncUrlsFromBlobs() {
  revokeUserPhotoUrls();
  userPhotoUrls = userPhotoBlobs.map((blob) => URL.createObjectURL(blob));
  updateUploadPanelText();
}

function updateCardTextures() {
  for (let i = 0; i < cardGroup.children.length; i += 1) {
    const card = cardGroup.children[i];
    const photoIndex = card.userData.photoIndex ?? i;
    const oldMap = card.material.map;
    card.material.map = getTextureFromActivePhotos(photoIndex);
    card.material.needsUpdate = true;
    if (oldMap && oldMap.isTexture) {
      oldMap.dispose();
    }
  }
}

photoPicker.addEventListener("change", async (event) => {
  const files = Array.from(event.target.files || []).filter((file) => file.type.startsWith("image/"));
  if (files.length === 0) {
    return;
  }
  const pickMode = photoPicker.dataset.pickMode === "replace" ? "replace" : "append";
  userPhotoBlobs = pickMode === "replace" ? files : [...userPhotoBlobs, ...files];
  syncUrlsFromBlobs();
  updateCardTextures();
  try {
    await savePhotoBlobs(userPhotoBlobs);
  } catch (error) {
    console.error("Gagal menyimpan foto ke IndexedDB:", error);
  }
  photoPicker.dataset.pickMode = "append";
  photoPicker.value = "";
});

readSavedPhotoBlobs()
  .then((savedBlobs) => {
    if (savedBlobs.length > 0) {
      userPhotoBlobs = savedBlobs;
      syncUrlsFromBlobs();
      updateCardTextures();
    } else {
      updateUploadPanelText();
    }
  })
  .catch((error) => {
    console.error("Gagal memuat foto dari IndexedDB:", error);
    updateUploadPanelText();
  });

const savedTitle = localStorage.getItem(TITLE_STORAGE_KEY);
setTitle3DText(savedTitle || DEFAULT_TITLE_TEXT, false);

window.addEventListener("beforeunload", () => {
  revokeUserPhotoUrls();
});

const clock = new THREE.Clock();

function restartAutoZoomCycle() {
  autoZoomStartedAt = clock.getElapsedTime();
  camera.position.copy(controls.target).add(autoZoomDirection.clone().multiplyScalar(autoZoomStartDist));
  controls.update();
}

repeatZoomBtn.addEventListener("click", () => {
  restartAutoZoomCycle();
});

function animate() {
  const t = clock.getElapsedTime();
  requestAnimationFrame(animate);

  const zoomElapsed = t - autoZoomStartedAt;
  const autoZoomActive = zoomElapsed >= 0 && zoomElapsed < autoZoomDuration;
  controls.enabled = !autoZoomActive;

  if (autoZoomActive) {
    let dist = autoZoomStartDist;
    if (zoomElapsed < autoZoomInDuration) {
      const pIn = zoomElapsed / autoZoomInDuration;
      dist = autoZoomStartDist + ((autoZoomNearDist - autoZoomStartDist) * pIn);
    } else {
      const outDuration = autoZoomDuration - autoZoomInDuration - autoZoomHoldDuration;
      const pOut = (zoomElapsed - autoZoomInDuration - autoZoomHoldDuration) / outDuration;
      dist = autoZoomNearDist + ((autoZoomEndDist - autoZoomNearDist) * pOut);
    }
    camera.position.copy(controls.target).add(autoZoomDirection.clone().multiplyScalar(dist));
  }

  sky.rotation.y += 0.00015;
  innerWhiteCloud.rotation.y -= 0.00042;
  whiteRingDense.rotation.y -= 0.00055;
  whiteRingMid.rotation.y -= 0.00042;
  whiteRingSparse.rotation.y -= 0.0003;
  nearFillCloud.rotation.y -= 0.00018;
  const redPos = redParticleSphere.geometry.attributes.position;
  const redArr = redPos.array;
  const redBase = redParticleSphere.userData.basePos;
  const redDir = redParticleSphere.userData.dir;
  const redPhase = redParticleSphere.userData.phase;
  const redAmp = redParticleSphere.userData.amp;
  const redShake = redParticleSphere.userData.shake;
  const redFloatAmp = redParticleSphere.userData.floatAmp;
  for (let i = 0; i < redPhase.length; i += 1) {
    const i3 = i * 3;
    const wobbleA = Math.sin((t * 5.1) + redPhase[i]) * redAmp[i];
    const wobbleB = Math.sin((t * 8.4) + (redPhase[i] * 1.7)) * (redAmp[i] * 0.3);
    const wobble = wobbleA + wobbleB;
    const shakeX = Math.sin((t * 19.5) + (redPhase[i] * 4.3)) * redShake[i];
    const shakeY = Math.cos((t * 22.2) + (redPhase[i] * 3.1)) * redShake[i];
    const shakeZ = Math.sin((t * 17.8) + (redPhase[i] * 5.6)) * redShake[i];
    const floatY = Math.sin((t * 1.6) + (redPhase[i] * 0.9)) * redFloatAmp[i];
    redArr[i3] = redBase[i3] + (redDir[i3] * wobble) + shakeX;
    redArr[i3 + 1] = redBase[i3 + 1] + (redDir[i3 + 1] * wobble) + shakeY + floatY;
    redArr[i3 + 2] = redBase[i3 + 2] + (redDir[i3 + 2] * wobble) + shakeZ;
  }
  redPos.needsUpdate = true;
  redParticleSphere.position.y = Math.sin(t * 0.85) * 2.2;

  for (let i = 0; i < cardGroup.children.length; i += 1) {
    const card = cardGroup.children[i];
    card.userData.angle -= card.userData.speed;
    card.position.x = Math.cos(card.userData.angle) * card.userData.radius;
    card.position.z = Math.sin(card.userData.angle) * card.userData.radius;
    card.position.y = card.userData.baseY + Math.sin(t * 0.8 + card.userData.floatOffset) * 1.5;
    card.lookAt(camera.position);
  }

  if (controls.enabled) {
    controls.update();
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  applyResponsiveLayout();
  const currentlyOpen = uploadPanel.style.pointerEvents !== "none";
  setPanelOpen(currentlyOpen);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
